
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathematical Modeling — Model Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F7F4;--card:#FFFFFF;--border:#E0DBD5;--text:#1A1714;
  --muted:#7A7570;--navy:#1A2B4A;--hover:#F0EDE8;
  --c1:#1E5FAD;--c1l:#E6F1FB;
  --c2:#5B3FA0;--c2l:#EEEDFE;
  --c3:#0D7A6A;--c3l:#E1F5EE;
  --c4:#C47A1A;--c4l:#FAEEDA;
  --c5:#993C1D;--c5l:#FAECE7;
  --c6:#1B6B42;--c6l:#EAF3DE;
}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);padding:28px 20px 80px}

.hdr{text-align:center;margin-bottom:28px}
.hdr h1{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px;
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.hdr p{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.filters{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);font-size:12px;font-family:'JetBrains Mono',monospace;
  cursor:pointer;transition:all .15s;color:var(--muted)}
.filter-btn:hover{border-color:var(--navy);color:var(--navy)}
.filter-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}

.sections{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

/* category */
.cat-section{background:var(--card);border-radius:12px;border:1.5px solid var(--border);overflow:hidden}
.cat-header{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;
  border-bottom:1px solid var(--border);user-select:none}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-title{font-size:15px;font-weight:700;color:var(--text)}
.cat-count{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);
  background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1px 8px}
.cat-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;
  margin-left:auto;padding-right:8px;display:none}
@media(min-width:700px){.cat-sub{display:block}}
.cat-arrow{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.cat-section.collapsed .cat-arrow{transform:rotate(-90deg)}
.cat-body{padding:12px 16px 16px}
.cat-section.collapsed .cat-body{display:none}

/* cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.model-card{border-radius:8px;border:1.5px solid var(--border);background:var(--bg);
  cursor:pointer;transition:all .18s;overflow:hidden}
.model-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.model-card.open{border-color:var(--ac);background:var(--card);box-shadow:0 6px 20px rgba(0,0,0,.10)}
.card-top{padding:10px 13px;display:flex;align-items:flex-start;gap:10px}
.card-bar{width:4px;min-height:36px;border-radius:2px;flex-shrink:0;background:var(--ac)}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.35}
.card-tag{font-size:9px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:3px;
  margin-top:4px;display:inline-block;background:var(--acl);color:var(--ac)}
.card-diff{font-size:9px;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace}
.star-on{color:#C47A1A}
.star-off{color:#D0CBC4}

/* detail panel */
.detail-panel{display:none;margin-top:12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--card);overflow:hidden}
.detail-panel.open{display:block}

.dp-hero{padding:14px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px}
.dp-bar{width:5px;height:48px;border-radius:3px;flex-shrink:0}
.dp-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.dp-tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 8px;
  border-radius:4px;display:inline-block;background:var(--acl);color:var(--ac)}
.dp-close{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;
  color:var(--muted);cursor:pointer;padding:5px 12px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg);flex-shrink:0;white-space:nowrap}
.dp-close:hover{background:var(--hover);color:var(--text)}

.dp-grid{display:grid;gap:0}
.dp-grid.two{grid-template-columns:1fr 1fr}
.dp-grid.one{grid-template-columns:1fr}
@media(max-width:700px){.dp-grid.two{grid-template-columns:1fr}}

.dp-block{padding:13px 16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.dp-block:last-child{border-right:none}
.dp-block.full{border-right:none}
.dp-lbl{font-size:9.5px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;
  letter-spacing:.08em;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.dp-lbl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--ac);flex-shrink:0}
.dp-txt{font-size:12px;color:var(--text);line-height:1.75}
.dp-txt li{margin-left:14px;margin-bottom:2px}

.formula{background:#F0F2F5;border-radius:6px;padding:10px 13px;margin-top:6px;
  font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#1A2B4A;
  line-height:1.75;white-space:pre-wrap}

.code-pill{display:inline-block;background:#1E2D3D;color:#A8D8A8;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:3px 8px;border-radius:4px;margin:2px 3px 0 0;line-height:1.4}

.warn{padding:12px 15px;background:#FFF8EC;border-left:3px solid #C47A1A;
  font-size:11.5px;color:#7A4A00;line-height:1.75;border-bottom:1px solid var(--border)}
.warn b{font-weight:600}
.good{padding:12px 15px;background:#F0FBF5;border-left:3px solid #1B6B42;
  font-size:11.5px;color:#1B4A2A;line-height:1.75}
.good b{font-weight:600}

.tip{text-align:center;margin-top:24px;font-size:11px;color:var(--muted);
  font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<div class="hdr">
  <h1>Mathematical Modeling — Model Reference</h1>
  <p>// click any model card to expand · filter by problem type</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter(0,this)">预测 Prediction</button>
  <button class="filter-btn" onclick="setFilter(1,this)">分类 Classification</button>
  <button class="filter-btn" onclick="setFilter(2,this)">统计分析 Statistics</button>
  <button class="filter-btn" onclick="setFilter(3,this)">评价 Evaluation</button>
  <button class="filter-btn" onclick="setFilter(4,this)">优化 Optimization</button>
  <button class="filter-btn" onclick="setFilter(5,this)">动态系统 Dynamics</button>
</div>

<div class="sections" id="sections"></div>
<div class="tip">// click category header to collapse · click card again to close</div>

<script>
const CATS = [
  { key:"预测 Prediction", color:"#1E5FAD", lt:"#E6F1FB",
    desc:"Keywords: predict, estimate, trend, future value",
    models:[
      { name:"线性回归", tag:"Regression", diff:2,
        when:["自变量与因变量呈线性关系","特征数量较少（< 10 列）","需要解释各因素的影响程度","作为复杂模型的基线对比"],
        example:"预测城市房价；分析广告投入与销量；估计 GDP 与各指标的关联",
        formula:"目标：min Σ(yᵢ - ŷᵢ)²\n预测：ŷ = β₀ + β₁x₁ + ... + βₙxₙ\n系数：β = (XᵀX)⁻¹Xᵀy\nR² = 1 - SS_res / SS_tot  （越接近1越好）\n调整R²：1 - (1-R²)(n-1)/(n-p-1)",
        tools:["sklearn.linear_model.LinearRegression","statsmodels.api.OLS  （含p值和置信区间）","sklearn.linear_model.Ridge  （L2正则）"],
        paper:"需报告：各系数值及显著性（p<0.05）、R²和调整R²、残差分布图、F检验结果。建议用 statsmodels 而非 sklearn，前者自动输出统计检验。",
        mistakes:["不检验线性假设——先画散点图确认","不做多重共线性检验——计算VIF，VIF>10需处理","用sklearn丢失p值——改用statsmodels","训练集R²=0.99就满意——检查测试集防止过拟合"],
        good:"满足 LINE 假设时效果最好；残差图呈随机分布是健康迹象；结果可解释是最大优势" },

      { name:"ARIMA 时间序列", tag:"Time Series", diff:3,
        when:["数据按时间顺序排列，有内在时序结构","要预测未来若干时间步","数据有趋势或自相关性","样本量 ≥ 50 个时间点"],
        example:"预测未来12个月销售量；预测月均气温；预测电力负荷",
        formula:"ARIMA(p, d, q)：\np = AR阶数：yₜ与过去p个值的关系\nd = 差分次数：消除趋势使序列平稳\nq = MA阶数：yₜ与过去q个残差的关系\n平稳检验：ADF，p < 0.05 为平稳\n定阶依据：PACF截尾→p；ACF截尾→q\nAIC / BIC 越小越好",
        tools:["statsmodels.tsa.arima.model.ARIMA","pmdarima.auto_arima  （自动定阶）","statsmodels.tsa.seasonal.SARIMAX  （季节性）"],
        paper:"需报告：ADF检验结果（证明平稳）、ACF/PACF图（定阶依据）、AIC/BIC选模、预测置信带（95%）、MAE和RMSE误差。",
        mistakes:["跳过平稳性检验直接建模","不用 auto_arima 而是随意猜 p,q","只报训练集误差——必须留测试集验证","有季节性却不用 SARIMA"],
        good:"适合有明显时序规律的数据；与 STL 分解结合（趋势+季节+残差）效果更好" },

      { name:"灰色预测 GM(1,1)", tag:"Small Sample", diff:2,
        when:["样本量极少（4～20条）","数据大致单调递增","缺乏完整历史数据","短期预测（3～5步以内）"],
        example:"基于近5年数据预测未来3年能源消耗；小城市人口短期预测",
        formula:"① 一次累加生成（AGO）：x⁽¹⁾ₖ = Σx⁽⁰⁾ᵢ\n② 建立微分方程：dx⁽¹⁾/dt + ax⁽¹⁾ = b\n③ 最小二乘估计参数 a, b\n④ 还原预测值：x̂⁽⁰⁾ₖ = x̂⁽¹⁾ₖ - x̂⁽¹⁾ₖ₋₁\n精度检验：\n  后验差比值 C < 0.35 为优\n  小误差概率 P > 0.95 为优",
        tools:["手写约40行代码","scipy.linalg.lstsq  （求参数）","grey 库 / greykit 库"],
        paper:"需报告：后验差比值C和小误差概率P（必须）、预测值与实际值对比表、误差分析。必须说明数据满足准指数律（单调递增）。",
        mistakes:["数据非单调递增强行用——结果会很差","预测步数 >5 步——误差急剧累积","忘做精度检验——C和P是必须汇报的","数据量够时仍用GM——换ARIMA"],
        good:"小样本场景的有效方法；代码简单；数据量多时改用 ARIMA 或机器学习" },

      { name:"随机森林回归", tag:"Ensemble", diff:3,
        when:["特征多、关系非线性","不想手动调参","需要特征重要性排名","作为稳健的基线模型"],
        example:"房价预测；医疗费用估计；零售销量预测",
        formula:"集成 T 棵决策树（Bagging）：\n每棵树从 √p 个随机特征中选分裂点\n预测：ŷ = (1/T)Σhₜ(x)\n特征重要性：基于不纯度减少量（MSE）\nOOB误差：袋外样本自动提供验证误差",
        tools:["sklearn.ensemble.RandomForestRegressor","model.feature_importances_  （特征重要性）","sklearn.inspection.permutation_importance"],
        paper:"论文必须展示特征重要性柱状图；报告OOB误差；与线性回归对比说明集成优势；报告 n_estimators 选取依据。",
        mistakes:["不展示特征重要性——浪费最大优势","n_estimators 太小（<100）——结果不稳定","不限制树深度——max_depth控制过拟合","忽视类别不平衡"],
        good:"对噪声和缺失值鲁棒；不需要归一化；特征重要性图是论文亮点" },

      { name:"XGBoost / LightGBM", tag:"Boosting", diff:4,
        when:["数据量 > 5000 行","特征较多（10～100列）","关系非线性且复杂","追求预测精度"],
        example:"电商销量预测；用户流失预测；信贷违约概率估计",
        formula:"梯度提升：F(x) = Σfₜ(x)，每棵树拟合上一轮残差\n正则化：Ω(f) = γT + ½λ||w||²\n（T=叶子数，w=叶子权重）\nLightGBM 改进：\n  按梯度绝对值排序抽样（GOSS）\n  互斥特征捆绑（EFB）",
        tools:["xgboost.XGBRegressor / XGBClassifier","lightgbm.LGBMRegressor / LGBMClassifier","sklearn.model_selection.GridSearchCV  （调参）","shap  （可解释性分析）"],
        paper:"需报告：超参数调优过程（学习率、树深度、子样本率）、特征重要性图、交叉验证曲线、与基线模型的对比。用SHAP值解释特征贡献。",
        mistakes:["不调参直接用默认——可能严重过拟合","不处理缺失值","只看训练误差——必须交叉验证","论文无法解释——用SHAP库"],
        good:"竞赛中表现最优的方法之一；用SHAP库输出特征贡献图解决可解释性问题" },
    ]
  },
  { key:"分类 Classification", color:"#5B3FA0", lt:"#EEEDFE",
    desc:"Keywords: classify, identify, belong to category, is/not",
    models:[
      { name:"逻辑回归", tag:"Binary / Multi-class", diff:2,
        when:["二分类或多分类问题","要求输出概率值","需要解释各特征的影响","作为基线模型"],
        example:"预测患者是否患病；判断邮件是否垃圾邮件；信贷违约概率",
        formula:"Sigmoid：p = 1/(1+e⁻ᶻ)，z = β₀+Σβᵢxᵢ\n损失：L = -Σ[ylog(p)+(1-y)log(1-p)]\n多分类：Softmax p_k = e^zₖ/Σe^zⱼ\n系数解释：e^βᵢ 为第i个特征的优势比（Odds Ratio）",
        tools:["sklearn.linear_model.LogisticRegression","statsmodels.api.Logit  （含p值）","sklearn.metrics.classification_report","sklearn.metrics.roc_auc_score"],
        paper:"需报告：各系数的优势比和显著性、ROC曲线和AUC值、混淆矩阵（精确率、召回率、F1）、类别不平衡时的处理方法。",
        mistakes:["类别严重不平衡不处理——加 class_weight='balanced'","只看准确率——不平衡时准确率误导性强，看AUC","多分类忘设 multi_class='multinomial'","不做显著性检验——用 statsmodels.Logit"],
        good:"可解释性强；输出的概率值可用于风险分级；计算速度快，适合快速验证" },

      { name:"随机森林分类", tag:"Ensemble", diff:3,
        when:["特征多，不确定哪些重要","数据有噪声或缺失值","需要特征重要性排名","需要稳健的基线模型"],
        example:"疾病诊断；信用评级；客户流失预测；故障识别",
        formula:"T棵决策树投票：ŷ = mode{hₜ(x)}\n每棵树随机选 √p 个特征\nGini不纯度：G = 1-Σpₖ²\n特征重要性：Gini减少量的平均值\nOOB error：袋外样本提供无偏估计",
        tools:["sklearn.ensemble.RandomForestClassifier","model.feature_importances_","sklearn.inspection.permutation_importance","imblearn.over_sampling.SMOTE  （类别不平衡）"],
        paper:"必须展示特征重要性柱状图；报告OOB误差；与单棵决策树对比；类别不平衡时说明处理方法（SMOTE / class_weight）。",
        mistakes:["不展示特征重要性","类别不平衡不处理","n_estimators 太小（<100）","不限制树深度导致过拟合"],
        good:"对噪声和异常值鲁棒；不需要归一化；特征重要性图是论文必备亮点" },

      { name:"SVM 支持向量机", tag:"Small Sample", diff:3,
        when:["样本量不大（< 5000）","高维特征空间","类别边界相对清晰","二分类为主"],
        example:"文本分类；基因表达数据分类；图像特征分类",
        formula:"最大化分类间隔：min ½||w||²\n约束：yᵢ(wᵀxᵢ+b) ≥ 1\n软间隔：min ½||w||² + C·Σξᵢ\n核函数：\n  RBF：K=exp(-γ||x-z||²)\n  多项式：K=(xᵀz+c)ᵈ\n支持向量：只有边界附近的点影响决策边界",
        tools:["sklearn.svm.SVC","sklearn.svm.LinearSVC  （大数据集）","GridSearchCV  调 C 和 gamma","sklearn.preprocessing.StandardScaler  （必须先标准化）"],
        paper:"需报告：核函数选择依据、C和gamma调优过程（网格搜索图）、支持向量数量、与其他分类器对比实验。",
        mistakes:["特征不标准化——SVM对量纲极度敏感","大数据集用SVC——改用LinearSVC","C和gamma用默认值——必须交叉验证调参","多分类忘设 decision_function_shape='ovr'"],
        good:"高维小样本场景下往往优于深度学习；核技巧使其能处理非线性问题" },

      { name:"k-means 聚类", tag:"Unsupervised", diff:2,
        when:["无标注数据，要发现自然分组","探索数据内在结构","将样本分为若干有意义的类别","配合其他分析使用"],
        example:"客户群体分析；城市功能区划分；基因表达模式发现",
        formula:"目标：min Σₖ Σᵢ∈Cₖ ||xᵢ - μₖ||²\n步骤：\n① 随机初始化k个质心\n② 分配每个点到最近质心\n③ 更新质心为各簇均值\n④ 重复②③至收敛\n评估：轮廓系数 s=(b-a)/max(a,b)，[-1,1]",
        tools:["sklearn.cluster.KMeans","sklearn.metrics.silhouette_score  （轮廓系数）","sklearn.cluster.DBSCAN  （非球形簇）","sklearn.decomposition.PCA  （降维后可视化）"],
        paper:"必须说明k的选取方法（肘部法则图+轮廓系数）；各簇特征分布箱线图；为每个簇命名（业务解释）；PCA降维后2D可视化聚类结果。",
        mistakes:["k值随意决定——必须用肘部法则或轮廓系数","不解释各簇实际含义——聚类完不解读等于没做","对量纲敏感不归一化","非球形分布用k-means——改用DBSCAN"],
        good:"简单高效；结果直观；与 TOPSIS/AHP 结合可做分类后再评价" },
    ]
  },
  { key:"统计分析 Statistics", color:"#0D7A6A", lt:"#E1F5EE",
    desc:"Keywords: influence factors, test difference, correlation, significance",
    models:[
      { name:"相关分析", tag:"Correlation", diff:1,
        when:["探索变量之间是否有线性关系","EDA阶段初步筛选特征","找出可能的多重共线性","判断是否需要处理相关特征"],
        example:"分析PM2.5与气温、风速、湿度的相关性；探索经济指标间关联",

        good:"代码不到20行但理论深度大；扩展为SEIR可提升论文层次；R₀是核心亮点" },

        when:["系统在有限离散状态间转移","未来只依赖当前状态（无记忆性）","长期稳态分析","天气、市场占有率分析"],

        example:"交通流仿真（NaSch模型）；城市土地利用变化；森林火灾蔓延",

// ── Rendering ─────────────────────────────────────────────

function starsHtml(n, max) {
  let s = '';
  for (let i = 0; i < max; i++)
    s += `<span class="${i < n ? 'star-on' : 'star-off'}">★</span>`;
  return s;
}

// global tracking: catIdx → modelIdx → panelEl
let currentOpen = null; // {catIdx, modelIdx}

function render(filterVal) {
  currentOpen = null;
  const container = document.getElementById('sections');
  container.innerHTML = '';

  CATS.forEach((cat, ci) => {
    if (filterVal !== 'all' && filterVal !== ci) return;

    const sec = document.createElement('div');
    sec.className = 'cat-section';

    // cards HTML
    const cardsHtml = cat.models.map((m, mi) => `
      <div class="model-card" style="--ac:${cat.color};--acl:${cat.lt}"
           id="card-${ci}-${mi}" onclick="onCard(${ci},${mi})">
        <div class="card-top">
          <div class="card-bar"></div>
          <div>
            <div class="card-name">${m.name}</div>
            <span class="card-tag">${m.tag}</span>
            <div class="card-diff">${starsHtml(m.diff,5)}</div>
          </div>
        </div>
      </div>
    `).join('');

    // detail panels HTML (one per model, hidden by default)
    const panelsHtml = cat.models.map((m, mi) => `
      <div class="detail-panel" id="panel-${ci}-${mi}" style="--ac:${cat.color};--acl:${cat.lt}">
        <div class="dp-hero">
          <div class="dp-bar" style="background:${cat.color}"></div>
          <div>
            <div class="dp-title">${m.name} &nbsp;<span style="font-size:13px;font-weight:400;color:var(--muted)">${starsHtml(m.diff,5)}</span></div>
            <span class="dp-tag">${m.tag}</span>
          </div>
          <button class="dp-close" onclick="closePanel(${ci},${mi})">Close ×</button>
        </div>

        <div class="dp-grid two">
          <div class="dp-block">
            <div class="dp-lbl">什么时候用</div>
            <ul class="dp-txt">${m.when.map(w=>`<li>${w}</li>`).join('')}</ul>
          </div>
          <div class="dp-block">
            <div class="dp-lbl">典型题目场景</div>
            <div class="dp-txt">${m.example}</div>
          </div>
        </div>

        <div class="dp-grid one" style="border-top:1px solid var(--border)">
          <div class="dp-block full">
            <div class="dp-lbl">核心公式 / 原理</div>
            <div class="formula">${m.formula}</div>
          </div>
        </div>

        <div class="dp-grid two" style="border-top:1px solid var(--border)">
          <div class="dp-block">
            <div class="dp-lbl">Python 工具</div>
            <div class="dp-txt">${m.tools.map(t=>`<span class="code-pill">${t}</span>`).join('')}</div>
          </div>
          <div class="dp-block">
            <div class="dp-lbl">论文怎么写这一节</div>
            <div class="dp-txt">${m.paper}</div>
          </div>
        </div>

        <div class="dp-grid two" style="border-top:1px solid var(--border)">
          <div class="warn"><b>⚠ 常见错误：</b><br>${m.mistakes.map(e=>`· ${e}`).join('<br>')}</div>
          <div class="good"><b>✓ 什么情况下效果最好：</b><br>${m.good}</div>
        </div>
      </div>
    `).join('');

    sec.innerHTML = `
      <div class="cat-header" onclick="toggleCat(this)">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <div class="cat-title">${cat.key}</div>
        <div class="cat-count">${cat.models.length} models</div>
        <div class="cat-sub">${cat.desc}</div>
        <div class="cat-arrow">▾</div>
      </div>
      <div class="cat-body">
        <div class="cards">${cardsHtml}</div>
        ${panelsHtml}
      </div>
    `;
    container.appendChild(sec);
  });
}

function onCard(ci, mi) {
  const card  = document.getElementById(`card-${ci}-${mi}`);
  const panel = document.getElementById(`panel-${ci}-${mi}`);
  const isOpen = card.classList.contains('open');

  // close all
  document.querySelectorAll('.model-card').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('open'));
  currentOpen = null;

  if (!isOpen) {
    card.classList.add('open');
    panel.classList.add('open');
    currentOpen = {ci, mi};
    setTimeout(() => panel.scrollIntoView({behavior:'smooth', block:'nearest'}), 60);
  }
}

function closePanel(ci, mi) {
  document.getElementById(`card-${ci}-${mi}`).classList.remove('open');
  document.getElementById(`panel-${ci}-${mi}`).classList.remove('open');
  currentOpen = null;
}

function toggleCat(hdr) {
  hdr.closest('.cat-section').classList.toggle('collapsed');
}

function setFilter(val, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(val);
}

render('all');
</script>
</body>
</html>
